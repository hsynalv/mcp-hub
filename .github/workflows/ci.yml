name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Run linter
        working-directory: mcp-server
        run: npm run lint
        continue-on-error: true

      - name: Run tests
        working-directory: mcp-server
        run: npm test -- --reporter=verbose
        env:
          NODE_ENV: test

      - name: Check coverage
        working-directory: mcp-server
        run: npm run test:coverage
        continue-on-error: true

      - name: Validate plugin contracts
        working-directory: mcp-server
        run: npm run test:contract
        continue-on-error: true

      - name: Build
        working-directory: mcp-server
        run: npm run build
        continue-on-error: true

  plugin-validation:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Validate plugin metadata
        working-directory: mcp-server
        run: node -e "const { validateAllPluginReadmes } = require('./src/core/readme-validator'); console.log(JSON.stringify(validateAllPluginReadmes('./src/plugins'), null, 2));"
        continue-on-error: true

      - name: Check OpenAPI sync
        working-directory: mcp-server
        run: node -e "const { validateOpenApiSync } = require('./src/core/openapi-generator'); const r = validateOpenApiSync(); if (!r.valid) { console.error(r.issues); process.exit(1); }"
        continue-on-error: true
